# Experiment configuration
# -----------------------

experiment:
  name: 'llm_grammar_factorial'
  seed: 42
  output_dir: 'results/'

models:
  - key: pythia
    name: EleutherAI/pythia-6.9b
    quantize: 8bit           # 8bit or 4bit
  - key: bloomz
    name: bigscience/bloomz-7b1
    quantize: 8bit

conditions:
  variants: [v1, v2, v3, v4]
  shot_counts: [0, 3, 8]

data:
  n_transitive: 20
  n_intransitive: 20
  n_ditransitive: 20
  n_adjective: 10            # Total: 70

generation:
  max_new_tokens: 64
  do_sample: false
  temperature: 1.0
  num_beams: 1

statistics:
  alpha: 0.05
  bonferroni_comparisons: 6
