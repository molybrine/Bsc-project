# docker compose config
# run with: docker compose run experiment python go.py --model pythia
services:
  experiment:
    build: .
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ~/llm-models:/models  # model cache
      - ~/llm-results:/results  # output
      - ./data:/app/data  # test set
    environment:
      - RESULTS_DIR=/results
      - HF_HOME=/models
      - TRANSFORMERS_CACHE=/models
